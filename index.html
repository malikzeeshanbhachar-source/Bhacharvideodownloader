<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader</title>
    <script>
        // Input validation function
        function validateInput(url) {
            const pattern = /^(https?:\/\/)?(www\.)?(tiktok\.com)(\/.*)?$/;
            return pattern.test(url);
        }

        async function downloadVideo() {
            const inputUrl = document.getElementById('videoUrl').value;
            if (!validateInput(inputUrl)) {
                alert('Invalid TikTok URL!');
                return;
            }
            // Rate limiting using setTimeout
            await new Promise(resolve => setTimeout(resolve, 1000)); // 1 second delay

            try {
                // XSS Prevention
                const safeUrl = encodeURIComponent(inputUrl);
                const response = await fetch(`https://api.example.com/download?url=${safeUrl}`, { 
                    method: 'GET',
                    credentials: 'include',
                    headers: { 'Access-Control-Allow-Origin': '*' } // CORS protection
                });
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                // Logic to handle download
                console.log('Download successful:', data);
            } catch (error) {
                console.error('Error:', error);
                alert('Error downloading the video. Please try again later.');
                // Log error for server-side
                logError(error.message);
            }
        }

        function logError(error) {
            console.error('Logging error:', error);
            // Implement the logging functionality, e.g., send to server
        }
    </script>
</head>
<body>
    <h1>TikTok Video Downloader</h1>
    <input type="text" id="videoUrl" placeholder="Enter TikTok Video URL" />
    <button onclick="downloadVideo()">Download</button>
</body>
</html>
